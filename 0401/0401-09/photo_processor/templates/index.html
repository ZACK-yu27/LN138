<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>照片处理工具</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>照片处理工具</h1>
            <p class="subtitle">支持黑白、放大、缩小、翻转等多种图片处理功能</p>
        </header>

        <main class="main-content">
            <div class="panel left-panel">
                <div class="panel-header">
                    <h2>上传图片</h2>
                </div>
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="17 8 12 3 7 8"/>
                            <line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                    </div>
                    <p class="upload-text">点击选择文件或拖拽图片到这里</p>
                    <p class="upload-hint">支持 JPG, PNG, GIF, BMP, WEBP 格式</p>
                    <input type="file" id="fileInput" accept="image/*" hidden>
                </div>

                <div class="preview-section" id="previewSection" style="display: none;">
                    <h3>原图预览</h3>
                    <div class="preview-container">
                        <img id="previewImage" src="" alt="预览图片">
                    </div>
                    <div class="image-info" id="imageInfo"></div>
                </div>
            </div>

            <div class="panel right-panel">
                <div class="panel-header">
                    <h2>处理结果</h2>
                </div>
                <div class="result-area" id="resultArea">
                    <div class="placeholder">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                            <circle cx="8.5" cy="8.5" r="1.5"/>
                            <polyline points="21 15 16 10 5 21"/>
                        </svg>
                        <p>上传图片并选择处理功能</p>
                    </div>
                    <img id="resultImage" src="" alt="处理结果" style="display: none;">
                </div>
                <button class="download-btn" id="downloadBtn" disabled>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    下载处理后的图片
                </button>
            </div>
        </main>

        <footer class="controls">
            <button class="process-btn" data-type="grayscale" disabled>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M12 2a10 10 0 0 1 0 20"/>
                </svg>
                黑白照片
            </button>
            <div class="scale-control">
                <button class="process-btn" data-type="scale" id="scaleBtn" disabled>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        <line x1="11" y1="8" x2="11" y2="14"/>
                        <line x1="8" y1="11" x2="14" y2="11"/>
                    </svg>
                    缩放
                </button>
                <input type="number" id="scaleInput" class="scale-input" value="100" min="10" max="500" placeholder="10-500">
                <span class="scale-unit">%</span>
            </div>
            <button class="process-btn" data-type="flip" disabled>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="17 1 21 5 17 9"/>
                    <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
                    <polyline points="7 23 3 19 7 15"/>
                    <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
                </svg>
                左右互换
            </button>
            <div class="emboss-control">
                <button class="process-btn" data-type="emboss" id="embossBtn" disabled>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="12 2 2 7 12 12 22 7 12 2"/>
                        <polyline points="2 17 12 22 22 17"/>
                        <polyline points="2 12 12 17 22 12"/>
                    </svg>
                    浮雕
                </button>
                <div class="emboss-params" id="embossParams" style="display: none;">
                    <div class="param-row">
                        <label>深度</label>
                        <input type="range" id="embossDepth" class="param-slider" min="1" max="10" value="5">
                        <span class="param-value" id="embossDepthValue">5</span>
                    </div>
                    <div class="param-row">
                        <label>方向</label>
                        <select id="embossDirection" class="param-select">
                            <option value="135">左上</option>
                            <option value="90">上</option>
                            <option value="45">右上</option>
                            <option value="0" selected>右</option>
                            <option value="315">右下</option>
                            <option value="270">下</option>
                            <option value="225">左下</option>
                            <option value="180">左</option>
                        </select>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <div class="toast" id="toast"></div>
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>处理中...</p>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
